name: Auto Assign Issue (Reusable)

on:
  workflow_call:

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/assign')

    steps:
      - name: Assign commenter to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;

            if (issue.assignees.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `@${commenter} This issue is already assigned to @${issue.assignees[0].login}. It will become available if they don't submit a PR within 5 days.`
              });
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [commenter]
            });

            const dateLabel = `assigned:${new Date().toISOString().split('T')[0]}`;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [dateLabel]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ @${commenter} has been assigned this issue. You have **5 days** to submit a pull request. If no PR is submitted in time, the issue will be unassigned and made available to others.`
            });
