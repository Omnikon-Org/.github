name: Discord Notifications

on:
  workflow_call:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "issues" ]; then
            MESSAGE="🐛 Issue: ${{ github.event.issue.title }} - ${{ github.event.issue.html_url }}"
          elif [ "$EVENT" = "pull_request" ]; then
            MESSAGE="🔀 Pull Request: ${{ github.event.pull_request.title }} - ${{ github.event.pull_request.html_url }}"
          elif [ "$EVENT" = "release" ]; then
            MESSAGE="🚀 Release: ${{ github.event.release.name }} - ${{ github.event.release.html_url }}"
          else
            MESSAGE="📢 GitHub Event Triggered"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"$MESSAGE\"}" \
          "$DISCORD_WEBHOOK"
