name: Stale Assignment Check (Reusable)

on:
  workflow_call:

permissions:
  issues: write

jobs:
  check-stale:
    runs-on: ubuntu-latest

    steps:
      - name: Unassign stale issues
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 5;
            const now = new Date();

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (issue.assignees.length === 0) continue;

              const assignee = issue.assignees[0].login;
              const assignedLabel = issue.labels.find(l =>
                l.name.startsWith('assigned:')
              );
              if (!assignedLabel) continue;

              const assignedDate = new Date(
                assignedLabel.name.replace('assigned:', '')
              );
              const daysSinceAssigned = Math.floor(
                (now - assignedDate) / (1000 * 60 * 60 * 24)
              );
              if (daysSinceAssigned < STALE_DAYS) continue;

              const pulls = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });

              const hasLinkedPR = pulls.data.some(pr => {
                const body = (pr.body || '').toLowerCase();
                return (
                  pr.user.login === assignee &&
                  (body.includes(`#${issue.number}`) ||
                   body.includes(`fixes #${issue.number}`) ||
                   body.includes(`closes #${issue.number}`) ||
                   body.includes(`resolves #${issue.number}`))
                );
              });
              if (hasLinkedPR) continue;

              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [assignee]
              });

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: assignedLabel.name
              }).catch(() => {});

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⏰ @${assignee} has been unassigned — no pull request was submitted within 5 days.\n\nThis issue is now **open for anyone**. Comment \`/assign\` to claim it.`
              });
            }
